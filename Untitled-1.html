<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Offre Incroyable</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #f4f4f4; 
            padding: 50px; 
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .console-img { 
            max-width: 100%; 
            height: auto; 
            width: 400px;
            margin-bottom: 20px;
        }
        .price { color: #d9534f; font-size: 2.5em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PlayStation 5 - Promo Flash</h1>
        
        <img src="PlayStation 5 wall paper.jfif" alt="PlayStation 5" class="console-img">
        
        <p>Prix sacrifié jusqu'au 30 juin 2026 sous condition de disponibilité :</p>
        <p class="price">40 €</p>
        
        <button onclick="alert('Article indisponible.')" style="padding:10px 20px; cursor:pointer;">
            Acheter maintenant
        </button>
    </div>

</body>
</html>
